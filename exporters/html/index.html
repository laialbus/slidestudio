<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SlideStudio</title>
  <!-- MathJax 3 — renders $$...$$ LaTeX in slide cards -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
      startup: { typeset: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d1117;
      --surface:    #161b22;
      --border:     #30363d;
      --text:       #e6edf3;
      --muted:      #7d8590;
      --accent:     #4f9cf9;
      --accent-dim: #112240;
      --radius:     12px;
      --ease:       0.22s ease;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────── */
    header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      flex-shrink: 0;
      min-width: 0;
    }

    /* ── Breadcrumb ─────────────────────── */
    .breadcrumb { display: flex; align-items: center; gap: 6px; min-width: 0; }
    .bc-sep     { color: var(--muted); user-select: none; flex-shrink: 0; font-size: 13px; }
    .bc-seg     { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
    .bc-brand   { font-size: 15px; font-weight: 700; letter-spacing: 0.04em; color: var(--accent); flex-shrink: 0; max-width: none; }
    .bc-link    { color: var(--accent); cursor: pointer; }
    .bc-link:hover { text-decoration: underline; }
    .bc-active  { color: var(--muted); }

    /* ── Main ───────────────────────────── */
    main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px;
    }

    /* ── State message ──────────────────── */
    .state-msg { color: var(--muted); font-size: 15px; text-align: center; margin-top: 40px; }

    /* ── Library ────────────────────────── */
    .library { width: 100%; max-width: 900px; }
    .library-top { margin-bottom: 24px; }
    .library-search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color var(--ease);
    }
    .library-search:focus { border-color: var(--accent); }
    .library-search::placeholder { color: var(--muted); }

    /* ── Card chips & meta ──────────────── */
    .card-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .chip {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 4px;
      padding: 2px 7px;
      margin-bottom: 8px;
    }
    .chip--multi  { background: rgba(79,156,249,0.15); color: var(--accent); }
    .chip--single { background: transparent; border: 1px solid var(--border); color: var(--muted); }

    /* ── TOC ────────────────────────────── */
    .toc { width: 100%; max-width: 900px; }
    .toc-heading {
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
    }
    .toc-sub {
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .toc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }
    .toc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 18px;
      cursor: pointer;
      transition: border-color var(--ease), background var(--ease), transform var(--ease), box-shadow var(--ease);
      user-select: none;
    }
    .toc-card:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .toc-num   { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
    .toc-label { font-size: 15px; font-weight: 600; line-height: 1.4; }

    /* ── Slide reel ─────────────────────── */
    .reel { width: 100%; max-width: 1060px; display: flex; flex-direction: column; gap: 20px; }

    .progress-bar  { width: 100%; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width var(--ease); }

    .slide-box {
      width: 100%;
      position: relative;
      padding-top: 56.25%; /* 16:9 */
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(28px, 5%, 60px) clamp(32px, 6%, 72px);
      opacity: 0;
      transition: opacity var(--ease);
      pointer-events: none;
      overflow-y: auto;
    }
    .slide.active { opacity: 1; pointer-events: auto; }

    .slide-tag {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .slide-title {
      font-size: clamp(20px, 3vw, 34px);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 22px;
    }
    .slide-body {
      font-size: clamp(13px, 1.6vw, 17px);
      line-height: 1.7;
      color: #c9d1d9;
    }

    /* ── Math rendering ─────────────────── */
    .slide-math {
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(79, 156, 249, 0.07);
      border-left: 3px solid var(--accent);
      border-radius: 4px;
      font-size: clamp(14px, 1.8vw, 18px);
      overflow-x: auto;
    }

    /* ── Figure rendering ───────────────── */
    .slide-figure {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }
    .slide-figure img {
      max-width: 100%;
      max-height: 220px;
      border-radius: 6px;
      border: 1px solid var(--border);
      object-fit: contain;
    }
    .slide-figure figcaption {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Controls ───────────────────────── */
    .controls { display: flex; align-items: center; gap: 12px; }
    .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: border-color var(--ease), background var(--ease);
      white-space: nowrap;
    }
    .btn:hover          { border-color: var(--accent); background: var(--accent-dim); }
    .btn:disabled       { opacity: 0.3; cursor: default; }
    .btn:disabled:hover { border-color: var(--border); background: var(--surface); }
    .btn-back           { color: var(--muted); margin-right: auto; }
    .counter            { font-size: 13px; color: var(--muted); min-width: 56px; text-align: center; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header>
    <nav class="breadcrumb" id="breadcrumb"></nav>
  </header>

  <main>
    <p class="state-msg" id="msg">Loading…</p>

    <!-- Library -->
    <div class="library hidden" id="library">
      <div class="library-top">
        <input type="search" class="library-search" id="library-search"
               placeholder="Search papers…" autocomplete="off">
      </div>
      <div class="toc-grid" id="library-grid"></div>
      <p class="state-msg hidden" id="library-empty"></p>
    </div>

    <!-- Table of Contents (multi-deck) -->
    <div class="toc hidden" id="toc">
      <h1 class="toc-heading" id="toc-heading"></h1>
      <p  class="toc-sub"     id="toc-sub"></p>
      <div class="toc-grid"   id="toc-grid"></div>
    </div>

    <!-- Slide Reel -->
    <div class="reel hidden" id="reel">
      <div class="progress-bar"><div class="progress-fill" id="pfill"></div></div>
      <div class="slide-box"  id="sbox"></div>
      <div class="controls">
        <button class="btn btn-back hidden" id="btn-back">← Back</button>
        <button class="btn" id="btn-prev" disabled>← Prev</button>
        <span   class="counter"           id="counter"></span>
        <button class="btn" id="btn-next">Next →</button>
      </div>
    </div>
  </main>

  <script>
    const $ = id => document.getElementById(id);
    const FILE = new URLSearchParams(location.search).get('file');

    let slides = [], deckImages = [], idx = 0;
    let currentLibraryEntries = [];
    let libraryLoaded         = false;
    let currentPaperTitle     = '';
    let currentChapterTitle   = '';
    let fromToc               = false;
    let currentTocFile        = FILE;

    /* ─── Utilities ──────────────────────────── */
    function hideAll() {
      ['msg', 'library', 'toc', 'reel'].forEach(id => $(id).classList.add('hidden'));
      $('btn-back').classList.add('hidden');
    }

    async function load(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    /* ─── Breadcrumb ─────────────────────────── */
    function showBreadcrumb(segments) {
      const nav = $('breadcrumb');
      nav.innerHTML = '';
      segments.forEach((seg, i) => {
        if (i > 0) {
          const sep = document.createElement('span');
          sep.className = 'bc-sep';
          sep.textContent = '›';
          nav.appendChild(sep);
        }
        const el = document.createElement('span');
        const isFirst  = i === 0;
        const isActive = !!seg.active;
        el.className = 'bc-seg'
          + (isFirst  ? ' bc-brand'  : '')
          + (isActive ? ' bc-active' : ' bc-link');
        el.textContent = seg.label;
        if (!isActive && seg.onClick) el.addEventListener('click', seg.onClick);
        nav.appendChild(el);
      });
    }

    /* ─── Library ────────────────────────────── */
    function showLibrary(entries) {
      hideAll();
      currentLibraryEntries = entries;
      $('library').classList.remove('hidden');
      showBreadcrumb([{ label: 'SlideStudio', active: true }]);
      $('library-search').value = '';
      renderLibraryCards(entries);
    }

    function renderLibraryCards(entries) {
      const grid  = $('library-grid');
      const empty = $('library-empty');
      grid.innerHTML = '';
      if (entries.length === 0) {
        empty.textContent = currentLibraryEntries.length === 0
          ? 'No papers generated yet. Run  python cli.py run paper.pdf  to get started.'
          : 'No papers match your search.';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      entries.forEach(e => {
        const card       = document.createElement('div');
        card.className   = 'toc-card';
        const chipClass  = e.type === 'multi_deck' ? 'chip--multi' : 'chip--single';
        const chipLabel  = e.type === 'multi_deck' ? 'Multi-deck' : 'Single';
        const meta       = buildMeta(e);
        card.innerHTML   =
          '<div class="chip ' + chipClass + '">' + chipLabel + '</div>' +
          '<div class="toc-label">'  + esc(e.title) + '</div>' +
          (meta ? '<div class="card-meta">' + esc(meta) + '</div>' : '');
        card.addEventListener('click', () => loadFromLibrary(e));
        grid.appendChild(card);
      });
    }

    function buildMeta(e) {
      const parts = [];
      if (e.generated_at) {
        try {
          parts.push(new Date(e.generated_at).toLocaleDateString('en-US', {
            month: 'short', day: 'numeric', year: 'numeric',
          }));
        } catch (_) {}
      }
      if (e.slide_count) parts.push(e.slide_count + ' slide' + (e.slide_count !== 1 ? 's' : ''));
      if (e.model)       parts.push(e.model);
      return parts.join(' · ');
    }

    $('library-search').addEventListener('input', ev => {
      const q = ev.target.value.trim().toLowerCase();
      renderLibraryCards(q
        ? currentLibraryEntries.filter(e => e.title.toLowerCase().includes(q))
        : currentLibraryEntries
      );
    });

    async function loadFromLibrary(entry) {
      currentPaperTitle = entry.title;
      currentTocFile    = entry.file;
      fromToc = false;
      try {
        const data = await load(entry.file);
        if (entry.type === 'multi_deck') {
          hideAll();
          showTOC(data);
        } else {
          hideAll();
          showReel(data.slides, data.images || []);
        }
      } catch (e) { alert('Could not load paper: ' + e.message); }
    }

    async function goLibraryHome() {
      if (!libraryLoaded) {
        try {
          currentLibraryEntries = await load('/outputs/library.json');
        } catch (_) {
          currentLibraryEntries = [];
        }
        libraryLoaded = true;
      }
      fromToc = false;
      showLibrary(currentLibraryEntries);
    }

    /* ─── TOC ────────────────────────────────── */
    function showTOC(data) {
      $('toc-heading').textContent = data.title;
      $('toc-sub').textContent = data.decks.length + ' chapter' + (data.decks.length !== 1 ? 's' : '') + ' — click to open';
      const base = currentTocFile
        ? currentTocFile.substring(0, currentTocFile.lastIndexOf('/') + 1)
        : '';
      const grid = $('toc-grid');
      grid.innerHTML = '';
      data.decks.forEach((d, i) => {
        const c = document.createElement('div');
        c.className = 'toc-card';
        c.innerHTML = '<div class="toc-num">Chapter ' + (i + 1) + '</div><div class="toc-label">' + esc(d.chapter_title) + '</div>';
        c.addEventListener('click', () => openChapter(base + d.file, d.chapter_title));
        grid.appendChild(c);
      });
      $('toc').classList.remove('hidden');
      showBreadcrumb([
        { label: 'SlideStudio', onClick: goLibraryHome },
        { label: data.title, active: true },
      ]);
    }

    function goToToc() {
      hideAll();
      fromToc = false;
      $('toc').classList.remove('hidden');
      showBreadcrumb([
        { label: 'SlideStudio', onClick: goLibraryHome },
        { label: currentPaperTitle, active: true },
      ]);
    }

    async function openChapter(url, chapterTitle) {
      try {
        const data = await load(url);
        currentChapterTitle = chapterTitle;
        fromToc = true;
        hideAll();
        showReel(data.slides, data.images || []);
      } catch (e) { alert('Could not load chapter: ' + e.message); }
    }

    /* ─── Reel ───────────────────────────────── */
    function showReel(data, images) {
      slides = data; deckImages = images; idx = 0;

      if (fromToc) {
        $('btn-back').classList.remove('hidden');
        showBreadcrumb([
          { label: 'SlideStudio', onClick: goLibraryHome },
          { label: currentPaperTitle, onClick: goToToc },
          { label: currentChapterTitle, active: true },
        ]);
      } else {
        showBreadcrumb([
          { label: 'SlideStudio', onClick: goLibraryHome },
          { label: currentPaperTitle, active: true },
        ]);
      }

      const box = $('sbox');
      box.innerHTML = '';
      data.forEach((s, i) => {
        const d = document.createElement('div');
        d.className = 'slide' + (i === 0 ? ' active' : '');

        let inner =
          '<div class="slide-tag">'  + esc(s.tag || '') + '</div>' +
          '<h2 class="slide-title">' + esc(s.heading)   + '</h2>'  +
          '<p class="slide-body">'   + esc(s.body)       + '</p>';

        // LaTeX — wrap in $$ delimiters for MathJax display rendering
        if (s.latex) {
          inner += '<div class="slide-math">$$' + s.latex + '$$</div>';
        }

        // Figure — look up image by index in the deck's images array
        if (s.image_ref != null) {
          const img = deckImages.find(im => im.index === s.image_ref);
          if (img && img.data_uri) {
            inner +=
              '<figure class="slide-figure">' +
              '<img src="' + img.data_uri + '" alt="' + esc(img.caption || '') + '">' +
              (img.caption ? '<figcaption>' + esc(img.caption) + '</figcaption>' : '') +
              '</figure>';
          }
        }

        d.innerHTML = inner;
        box.appendChild(d);
      });
      $('reel').classList.remove('hidden');
      sync();
      typeset(box);
    }

    /* Re-render MathJax in the given container after DOM update */
    function typeset(container) {
      if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetPromise([container]).catch(err => console.warn('MathJax error:', err));
      }
    }

    function goTo(n) {
      const all = $('sbox').querySelectorAll('.slide');
      if (n < 0 || n >= all.length) return;
      all[idx].classList.remove('active');
      idx = n;
      all[idx].classList.add('active');
      sync();
    }

    function sync() {
      const t = slides.length;
      $('counter').textContent = (idx + 1) + ' / ' + t;
      $('btn-prev').disabled   = idx === 0;
      $('btn-next').disabled   = idx === t - 1;
      $('pfill').style.width   = ((idx + 1) / t * 100) + '%';
    }

    /* ─── Events ─────────────────────────────── */
    $('btn-prev').addEventListener('click', () => goTo(idx - 1));
    $('btn-next').addEventListener('click', () => goTo(idx + 1));
    $('btn-back').addEventListener('click', () => goToToc());
    document.addEventListener('keydown', e => {
      if (document.activeElement === $('library-search')) return;
      if (e.key === 'ArrowLeft')  goTo(idx - 1);
      if (e.key === 'ArrowRight') goTo(idx + 1);
    });

    /* ─── Bootstrap ──────────────────────────── */
    async function init() {
      showBreadcrumb([{ label: 'SlideStudio', active: true }]);
      if (FILE) {
        try {
          const data = await load(FILE);
          currentPaperTitle = data.title || '';
          if (data.type === 'multi_deck') {
            hideAll();
            showTOC(data);
          } else {
            hideAll();
            showReel(data.slides, data.images || []);
          }
        } catch (e) {
          $('msg').textContent = 'Failed to load: ' + e.message;
        }
      } else {
        try {
          currentLibraryEntries = await load('/outputs/library.json');
        } catch (_) {
          currentLibraryEntries = [];
        }
        libraryLoaded = true;
        showLibrary(currentLibraryEntries);
      }
    }

    init();
  </script>
</body>
</html>
