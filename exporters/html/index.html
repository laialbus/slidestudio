<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SlideStudio</title>

  <!-- Fonts: Refined Serif and Modern Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- MathJax 3 -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
      startup: { typeset: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" defer></script>

  <style>
    /* ── Mu Aesthetic: Color Palettes ───────────────── */
    :root[data-theme="light"] {
      --bg:         #f7f7f5; /* Washi Paper */
      --surface:    #ffffff;
      --border:     #e2e2df;
      --text:       #2d2d2d; /* Ink */
      --muted:      #8c8c88;
      --accent:     #5e6d5e; /* Moss / Sage */
      --accent-dim: #f0f0ed;
      --slide-bg:   #ffffff;
      --shadow:     0 4px 20px rgba(0,0,0,0.03);
    }

    :root[data-theme="dark"] {
      --bg:         #0d0d0d; /* Obsidian / Dark Ink */
      --surface:    #141414;
      --border:     #262626;
      --text:       #d1d1d1; /* Silver */
      --muted:      #666666;
      --accent:     #8c7a6b; /* Muted Wood */
      --accent-dim: #1a1a1a;
      --slide-bg:   #111111;
      --shadow:     0 4px 24px rgba(0,0,0,0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 300;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      transition: background 0.5s ease, color 0.5s ease;
      overflow-x: hidden;
    }

    /* ── Layout ─────────────────────────── */
    header {
      padding: 32px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 10;
    }

    main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 0 48px 64px 48px;
    }

    /* ── Theme Toggle ───────────────────── */
    .theme-toggle {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.3s ease;
    }
    .theme-toggle:hover { color: var(--accent); }
    .theme-toggle svg { width: 20px; height: 20px; stroke-width: 1.5; }

    /* ── Breadcrumb ─────────────────────── */
    .breadcrumb { display: flex; align-items: center; gap: 12px; }
    .bc-sep     { color: var(--muted); font-size: 11px; opacity: 0.5; }
    .bc-seg     { font-size: 13px; letter-spacing: 0.05em; text-transform: uppercase; white-space: nowrap; }
    .bc-brand   { font-weight: 600; color: var(--text); font-family: 'Cormorant Garamond', serif; text-transform: none; font-size: 20px; margin-right: 12px; }
    .bc-link    { color: var(--muted); cursor: pointer; transition: color 0.3s ease; }
    .bc-link:hover { color: var(--text); }
    .bc-active  { color: var(--muted); opacity: 0.7; }

    /* ── State message ──────────────────── */
    .state-msg { color: var(--muted); font-size: 16px; font-family: 'Cormorant Garamond', serif; font-style: italic; margin-top: 80px; text-align: center; }

    /* ── Library ────────────────────────── */
    .library { width: 100%; max-width: 1100px; animation: fadeIn 0.8s ease; }
    .library-top { margin-bottom: 48px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
    .library-search {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      outline: none;
    }
    .library-search::placeholder { color: var(--muted); opacity: 0.3; }

    .toc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 32px;
    }
    .toc-card {
      padding: 32px 0;
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      border-top: 1px solid var(--border);
      position: relative;
    }
    .toc-card:hover { transform: translateX(8px); }
    .toc-card::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.4s ease;
    }
    .toc-card:hover::after { width: 40px; }

    .toc-num   { font-size: 11px; font-weight: 500; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 12px; }
    .toc-label { font-size: 22px; font-family: 'Cormorant Garamond', serif; font-weight: 500; line-height: 1.3; color: var(--text); }
    .card-meta { font-size: 12px; color: var(--muted); margin-top: 12px; letter-spacing: 0.02em; }

    .chip {
      display: inline-block;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 16px;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 2px;
    }

    /* ── Card action button (Archive / Restore) ── */
    .card-action {
      position: absolute;
      top: 28px;
      right: 0;
      background: none;
      border: none;
      color: var(--muted);
      opacity: 0;
      cursor: pointer;
      padding: 4px;
      transition: opacity 0.2s ease, color 0.2s ease;
      display: flex;
      align-items: center;
    }
    .card-action svg { width: 15px; height: 15px; stroke-width: 1.5; }
    .toc-card:hover .card-action { opacity: 1; }
    .card-action:hover { color: var(--text) !important; }

    /* ── TOC View ───────────────────────── */
    .toc { width: 100%; max-width: 1100px; animation: fadeIn 0.8s ease; }
    .toc-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 500;
      margin-bottom: 12px;
      text-align: left;
    }
    .toc-sub {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 64px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── Slide Reel ─────────────────────── */
    .reel {
      width: 100%;
      max-width: 1200px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      animation: fadeIn 1s ease;
    }

    .progress-bar  { width: 100%; height: 1px; background: var(--border); overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1); }

    .slide-box {
      width: 100%;
      position: relative;
      padding-top: 56.25%; /* 16:9 */
      background: var(--slide-bg);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      /* "safe center" keeps overflowing content scrollable from the top —
         plain "center" pushes the overflow above the scroll origin, clipping
         the heading or the top of a tall figure permanently. */
      justify-content: safe center;
      padding: 8% 10%;
      opacity: 0;
      transform: translateX(30px);
      transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
      overflow-y: auto;
    }
    .slide.active { opacity: 1; transform: translateX(0); pointer-events: auto; }
    .slide.prev   { transform: translateX(-30px); }

    .slide-tag {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
    }
    .slide-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 500;
      line-height: 1.1;
      margin-bottom: 32px;
      color: var(--text);
    }
    .slide-body {
      font-size: clamp(15px, 1.8vw, 19px);
      line-height: 1.8;
      color: var(--text);
      opacity: 0.85;
      font-weight: 400;
    }

    /* ── Math & Figures ─────────────────── */
    .slide-math {
      margin-top: 24px;
      padding: 16px;
      background: var(--accent-dim);
      border-left: 1px solid var(--accent);
      font-size: clamp(14px, 1.8vw, 18px);
    }

    .slide-figure {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .slide-figure img {
      max-width: 80%;
      max-height: 300px;
      border: 1px solid var(--border);
      filter: grayscale(0.2);
      cursor: zoom-in;
    }
    .slide-figure figcaption {
      font-size: 12px;
      color: var(--muted);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
    }

    /* ── Figure zoom overlay ────────────────
       Click a slide figure to view it full size; the 300px cap above keeps
       slides compact, this lifts the cap on demand for dense diagrams. */
    .zoom-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 4vmin;
      background: rgba(0, 0, 0, 0.85);
      cursor: zoom-out;
    }
    .zoom-overlay.open { display: flex; }
    .zoom-overlay img {
      max-width: 96vw;
      max-height: 92vh;
      object-fit: contain;
      box-shadow: var(--shadow);
    }

    /* ── Controls ───────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding-top: 16px;
      position: relative;
    }
    .btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.3s ease, opacity 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover:not(:disabled) { color: var(--text); }
    .btn:disabled { opacity: 0.15; cursor: default; }

    .btn-back-nav { position: absolute; left: 0; }

    .counter {
      font-size: 12px;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.1em;
      opacity: 0.6;
    }

    /* ── Animations ─────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hidden { display: none !important; }

    .btn-header {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 6px 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-right: 24px;
      border-radius: 2px;
    }
    .btn-header:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    .btn-header.active {
      border-color: var(--accent);
      color: var(--text);
    }

    /* ── Upload View ────────────────── */
    .upload-view { width: 100%; max-width: 800px; animation: fadeIn 0.8s ease; }

    .upload-zone {
      border: 1px dashed var(--border);
      padding: 40px 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.3s ease, background 0.3s ease;
      margin-bottom: 48px;
    }
    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .upload-label {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .upload-browse {
      color: var(--accent);
      cursor: pointer;
      text-underline-offset: 3px;
      text-decoration: underline;
      text-decoration-color: transparent;
      transition: text-decoration-color 0.2s ease;
    }
    .upload-browse:hover { text-decoration-color: var(--accent); }

    /* ── Generation Panel ───────────── */
    .gen-panel {
      border: 1px solid var(--border);
      padding: 32px;
      margin-bottom: 48px;
      animation: fadeIn 0.4s ease;
    }
    .gen-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .gen-filename {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      color: var(--text);
    }
    .gen-reset {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      transition: color 0.3s ease;
    }
    .gen-reset:hover { color: var(--text); }
    .gen-actions { display: flex; gap: 18px; align-items: center; }
    .gen-resume { color: var(--accent); }
    .gen-resume:hover { color: var(--accent); opacity: 0.75; }
    .gen-stages { list-style: none; }
    .gen-stage {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      transition: color 0.4s ease;
    }
    .gen-stage:last-child { border-bottom: none; }
    .gen-stage.active { color: var(--text); }
    .gen-stage.done   { color: var(--accent); }
    .gen-stage-dot {
      width: 16px;
      text-align: center;
      font-size: 12px;
      flex-shrink: 0;
    }
    .gen-error {
      margin-top: 16px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: var(--muted);
    }

    /* ── Modal ──────────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 40px;
      max-width: 440px;
      width: calc(100% - 48px);
    }
    .modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 12px;
    }
    .modal-body {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .modal-actions {
      display: flex;
      gap: 16px;
      justify-content: flex-end;
    }
    .modal-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 8px 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 2px;
    }
    .modal-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    .modal-btn-danger:hover {
      border-color: #a05050;
      color: #c07070;
    }

    /* Custom scrollbar for Mu feel */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ── Settings Modal ─────────────────── */
    .modal-settings { max-width: 520px; }
    .modal-btn.active { border-color: var(--accent); color: var(--text); }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .settings-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .settings-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      padding: 5px 10px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s ease;
    }
    .settings-select:focus { border-color: var(--accent); }

    .settings-section-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 20px 0 12px;
    }
    .settings-model-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .settings-input {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      padding: 6px 10px;
      outline: none;
      transition: border-color 0.2s ease;
      min-width: 0;
    }
    .settings-input:focus { border-color: var(--accent); }
    .settings-del-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.2s ease;
      flex-shrink: 0;
    }
    .settings-del-btn:hover:not(:disabled) { color: var(--text); }
    .settings-del-btn:disabled { opacity: 0.2; cursor: default; }
    .settings-add-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 8px 0;
      transition: color 0.2s ease;
    }
    .settings-add-btn:hover { color: var(--text); }
    .settings-theme-btn {
      padding: 6px 10px;
      display: flex;
      align-items: center;
    }
    .settings-theme-btn svg { width: 16px; height: 16px; stroke-width: 1.5; }
    .settings-error {
      font-size: 12px;
      color: #c07070;
      min-height: 18px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <header>
    <nav class="breadcrumb" id="breadcrumb"></nav>
    <div style="display: flex; align-items: center;">
      <button class="btn-header" id="btn-archive-nav" title="Archive">
        <!-- box/archive icon -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:14px;height:14px;stroke-width:1.5;vertical-align:middle;margin-right:6px;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-.375c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v.375c0 .621.504 1.125 1.125 1.125z" />
        </svg>Archive
      </button>
      <button class="btn-header" id="btn-upload-nav">Upload</button>
      <button class="theme-toggle" id="settings-btn" title="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </button>
    </div>
  </header>

  <main>
    <p class="state-msg" id="msg">Awaiting clarity…</p>

    <!-- Upload View -->
    <div class="upload-view hidden" id="upload-view">
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept=".pdf" hidden>
        <p class="upload-label">Drop a PDF to generate slides, or <span class="upload-browse" id="upload-browse">browse</span></p>
      </div>
      <div class="gen-panel hidden" id="gen-panel">
        <div class="gen-header">
          <span class="gen-filename" id="gen-filename"></span>
          <span class="gen-actions">
            <button class="gen-reset gen-resume hidden" id="gen-resume">Resume</button>
            <button class="gen-reset" id="gen-reset">Start over</button>
          </span>
        </div>
        <ul class="gen-stages" id="gen-stages"></ul>
        <p class="gen-error hidden" id="gen-error"></p>
      </div>
    </div>

    <!-- Library -->
    <div class="library hidden" id="library">
      <div class="library-top">
        <input type="search" class="library-search" id="library-search"
               placeholder="Search…" autocomplete="off">
      </div>
      <div class="toc-grid" id="library-grid"></div>
      <p class="state-msg hidden" id="library-empty"></p>
    </div>

    <!-- Archive View -->
    <div class="library hidden" id="archive-view">
      <div class="library-top">
        <input type="search" class="library-search" id="archive-search"
               placeholder="Search archive…" autocomplete="off">
      </div>
      <div class="toc-grid" id="archive-grid"></div>
      <p class="state-msg hidden" id="archive-empty"></p>
    </div>

    <!-- Table of Contents -->
    <div class="toc hidden" id="toc">
      <h1 class="toc-heading" id="toc-heading"></h1>
      <p  class="toc-sub"     id="toc-sub"></p>
      <div class="toc-grid"   id="toc-grid"></div>
    </div>

    <!-- Slide Reel -->
    <div class="reel hidden" id="reel">
      <div class="progress-bar"><div class="progress-fill" id="pfill"></div></div>
      <div class="slide-box"  id="sbox"></div>
      <div class="controls">
        <button class="btn btn-back-nav hidden" id="btn-back">← Back</button>
        <button class="btn" id="btn-prev" disabled>PREVIOUS</button>
        <span   class="counter"           id="counter"></span>
        <button class="btn" id="btn-next">NEXT</button>
      </div>
    </div>
  </main>

  <!-- Figure zoom overlay -->
  <div class="zoom-overlay" id="zoom-overlay"><img id="zoom-img" alt=""></div>

  <!-- Settings Modal -->
  <div class="modal-backdrop hidden" id="settings-modal">
    <div class="modal modal-settings">
      <p class="modal-title">Settings</p>

      <div class="settings-row">
        <span class="settings-label">Theme</span>
        <div style="display:flex;gap:8px">
          <button class="modal-btn settings-theme-btn" id="s-theme-dark" title="Dark">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
          </button>
          <button class="modal-btn settings-theme-btn" id="s-theme-light" title="Light">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
            </svg>
          </button>
        </div>
      </div>

      <div class="settings-row">
        <span class="settings-label">Regenerating a paper</span>
        <div style="display:flex;gap:8px">
          <button class="modal-btn" id="s-policy-overwrite" title="Replace the previous slides for the same paper">Overwrite</button>
          <button class="modal-btn" id="s-policy-keep" title="Keep every generation side by side">Keep both</button>
        </div>
      </div>

      <div class="settings-row">
        <span class="settings-label">Provider</span>
        <select id="s-provider" class="settings-select"></select>
      </div>

      <div class="settings-section-label">Models</div>
      <div id="s-models-list"></div>
      <button class="settings-add-btn" id="s-add-model">+ Add model</button>

      <p class="settings-error" id="s-error"></p>

      <div class="modal-actions">
        <button class="modal-btn" id="s-cancel">Cancel</button>
        <button class="modal-btn" id="s-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Collision Modal -->
  <div class="modal-backdrop hidden" id="collision-modal">
    <div class="modal">
      <p class="modal-title">Name conflict</p>
      <p class="modal-body" id="collision-msg"></p>
      <div class="modal-actions">
        <button class="modal-btn" id="modal-abort">Abort</button>
        <button class="modal-btn modal-btn-danger" id="modal-replace">Delete archive copy</button>
      </div>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const FILE = new URLSearchParams(location.search).get('file');

    let slides = [], deckImages = [], idx = 0;
    let allEntries             = [];
    let currentLibraryEntries  = [];
    let currentArchivedEntries = [];
    let currentPaperTitle      = '';
    let currentChapterTitle    = '';
    let fromToc                = false;
    let currentTocFile         = FILE;
    let _pollTimer             = null;
    let _currentJobId          = null;

    const STAGE_LABELS = {
      extract: 'Extracting text',
      analyst: 'Analysing document',
      planner: 'Planning slides',
      writer:  'Writing slides',
      review:  'Reviewing',
      chapter: 'Generating chapters',
    };

    /* ─── Theme Management ────────────────────── */
    function initTheme() {
      setTheme(localStorage.getItem('theme') || 'dark');
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
    }

    /* ─── Utilities ──────────────────────────── */
    function hideAll() {
      ['msg', 'library', 'archive-view', 'toc', 'reel', 'upload-view'].forEach(id => $(id).classList.add('hidden'));
      $('btn-back').classList.add('hidden');
      $('btn-archive-nav').classList.remove('active');
      $('btn-upload-nav').classList.remove('active');
    }

    async function load(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function slugFromEntry(e) {
      const parts = e.file.split('/').filter(Boolean);
      if (e.type === 'multi_deck') {
        return parts[parts.length - 2];
      }
      return parts[parts.length - 1].replace(/\.json$/, '');
    }

    /* ─── Breadcrumb ─────────────────────────── */
    function showBreadcrumb(segments) {
      const nav = $('breadcrumb');
      nav.innerHTML = '';
      segments.forEach((seg, i) => {
        if (i > 0) {
          const sep = document.createElement('span');
          sep.className = 'bc-sep';
          sep.textContent = '/';
          nav.appendChild(sep);
        }
        const el = document.createElement('span');
        const isFirst  = i === 0;
        const isActive = !!seg.active;
        el.className = 'bc-seg'
          + (isFirst  ? ' bc-brand'  : '')
          + (isActive ? ' bc-active' : ' bc-link');
        el.textContent = seg.label;
        if (!isActive && seg.onClick) el.addEventListener('click', seg.onClick);
        nav.appendChild(el);
      });
    }

    /* ─── Data refresh ───────────────────────── */
    async function refreshLibrary() {
      try {
        allEntries = await load('/library');
      } catch (_) {
        allEntries = [];
      }
      const alpha = (a, b) => (a.title || '').localeCompare(b.title || '');
      currentLibraryEntries  = allEntries.filter(e => !e.archived).sort(alpha);
      currentArchivedEntries = allEntries.filter(e => e.archived).sort(alpha);
    }

    /* ─── Library ────────────────────────────── */
    function showLibrary(entries) {
      hideAll();
      $('library').classList.remove('hidden');
      showBreadcrumb([{ label: 'SlideStudio', active: true }]);
      $('library-search').value = '';
      renderLibraryCards(entries);
    }

    function renderLibraryCards(entries) {
      const grid  = $('library-grid');
      const empty = $('library-empty');
      grid.innerHTML = '';
      if (entries.length === 0) {
        empty.textContent = currentLibraryEntries.length === 0
          ? 'Silence. No archives found.'
          : 'Nothing matches your search.';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      entries.forEach(e => {
        const card = document.createElement('div');
        card.className = 'toc-card';
        const chipLabel = e.type === 'multi_deck' ? 'Series' : 'Single';
        const meta = buildMeta(e);
        card.innerHTML =
          '<div class="chip">' + chipLabel + '</div>' +
          '<button class="card-action" title="Move to archive" aria-label="Archive">' +
            '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-.375c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v.375c0 .621.504 1.125 1.125 1.125z" /></svg>' +
          '</button>' +
          '<div class="toc-label">'  + esc(e.title) + '</div>' +
          (meta ? '<div class="card-meta">' + esc(meta) + '</div>' : '');
        card.querySelector('.card-action').addEventListener('click', ev => {
          ev.stopPropagation();
          archiveDeck(e);
        });
        card.addEventListener('click', () => loadFromLibrary(e));
        grid.appendChild(card);
      });
    }

    function buildMeta(e) {
      const parts = [];
      if (e.generated_at) {
        try {
          parts.push(new Date(e.generated_at).toLocaleDateString('en-US', {
            month: 'short', year: 'numeric',
          }));
        } catch (_) {}
      }
      if (e.slide_count) parts.push(e.slide_count + ' slides');
      return parts.join(' · ');
    }

    $('library-search').addEventListener('input', ev => {
      const q = ev.target.value.trim().toLowerCase();
      renderLibraryCards(q
        ? currentLibraryEntries.filter(e => e.title.toLowerCase().includes(q))
        : currentLibraryEntries
      );
    });

    async function loadFromLibrary(entry) {
      currentPaperTitle = entry.title;
      currentTocFile    = entry.file;
      fromToc = false;
      try {
        const data = await load(entry.file);
        if (entry.type === 'multi_deck') {
          hideAll();
          showTOC(data);
        } else {
          hideAll();
          showReel(data.slides, data.images || []);
        }
      } catch (e) { alert('Could not load paper: ' + e.message); }
    }

    async function goLibraryHome() {
      await refreshLibrary();
      fromToc = false;
      showLibrary(currentLibraryEntries);
    }

    /* ─── Archive ────────────────────────────── */
    function showArchiveView(entries) {
      hideAll();
      $('archive-view').classList.remove('hidden');
      $('btn-archive-nav').classList.add('active');
      showBreadcrumb([
        { label: 'SlideStudio', onClick: goLibraryHome },
        { label: 'Archive', active: true },
      ]);
      $('archive-search').value = '';
      renderArchiveCards(entries);
    }

    function renderArchiveCards(entries) {
      const grid  = $('archive-grid');
      const empty = $('archive-empty');
      grid.innerHTML = '';
      if (entries.length === 0) {
        empty.textContent = currentArchivedEntries.length === 0
          ? 'The archive is empty.'
          : 'Nothing matches your search.';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      entries.forEach(e => {
        const card = document.createElement('div');
        card.className = 'toc-card';
        const chipLabel = e.type === 'multi_deck' ? 'Series' : 'Single';
        const meta = buildMeta(e);
        card.innerHTML =
          '<div class="chip">' + chipLabel + '</div>' +
          '<button class="card-action" title="Restore to library" aria-label="Restore" style="color:var(--accent)">' +
            '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3" /></svg>' +
          '</button>' +
          '<div class="toc-label">'  + esc(e.title) + '</div>' +
          (meta ? '<div class="card-meta">' + esc(meta) + '</div>' : '');
        card.querySelector('.card-action').addEventListener('click', ev => {
          ev.stopPropagation();
          restoreDeck(e);
        });
        card.addEventListener('click', () => loadFromLibrary(e));
        grid.appendChild(card);
      });
    }

    $('archive-search').addEventListener('input', ev => {
      const q = ev.target.value.trim().toLowerCase();
      renderArchiveCards(q
        ? currentArchivedEntries.filter(e => e.title.toLowerCase().includes(q))
        : currentArchivedEntries
      );
    });

    async function archiveDeck(entry) {
      const slug = slugFromEntry(entry);
      try {
        const r = await fetch('/archive/' + encodeURIComponent(slug), { method: 'POST' });
        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          throw new Error(err.detail || 'HTTP ' + r.status);
        }
        await refreshLibrary();
        const q = $('library-search').value.trim().toLowerCase();
        renderLibraryCards(q
          ? currentLibraryEntries.filter(e => e.title.toLowerCase().includes(q))
          : currentLibraryEntries
        );
      } catch (err) {
        alert('Could not archive: ' + err.message);
      }
    }

    async function restoreDeck(entry) {
      const slug = slugFromEntry(entry);
      try {
        const r = await fetch('/unarchive/' + encodeURIComponent(slug), { method: 'POST' });
        if (r.status === 409) {
          showCollisionModal(slug, entry.title);
          return;
        }
        if (!r.ok) throw new Error('HTTP ' + r.status);
        await refreshLibrary();
        const q = $('archive-search').value.trim().toLowerCase();
        renderArchiveCards(q
          ? currentArchivedEntries.filter(e => e.title.toLowerCase().includes(q))
          : currentArchivedEntries
        );
      } catch (err) {
        alert('Could not restore: ' + err.message);
      }
    }

    function showCollisionModal(slug, title) {
      $('collision-msg').textContent =
        '"' + title + '" already exists in your library. ' +
        'Abort to keep both, or delete the archive copy to clean it up.';
      $('collision-modal').classList.remove('hidden');

      $('modal-abort').onclick = () => $('collision-modal').classList.add('hidden');

      $('modal-replace').onclick = async () => {
        $('collision-modal').classList.add('hidden');
        try {
          const r = await fetch('/archive/' + encodeURIComponent(slug), { method: 'DELETE' });
          if (!r.ok) throw new Error('HTTP ' + r.status);
          await refreshLibrary();
          const q = $('archive-search').value.trim().toLowerCase();
          renderArchiveCards(q
            ? currentArchivedEntries.filter(e => e.title.toLowerCase().includes(q))
            : currentArchivedEntries
          );
        } catch (err) {
          alert('Could not delete archive copy: ' + err.message);
        }
      };
    }

    /* ─── TOC ────────────────────────────────── */
    function showTOC(data) {
      $('toc-heading').textContent = data.title;
      $('toc-sub').textContent = data.decks.length + ' chapter' + (data.decks.length !== 1 ? 's' : '');
      const base = currentTocFile
        ? currentTocFile.substring(0, currentTocFile.lastIndexOf('/') + 1)
        : '';
      const grid = $('toc-grid');
      grid.innerHTML = '';
      data.decks.forEach((d, i) => {
        const c = document.createElement('div');
        c.className = 'toc-card';
        c.innerHTML = '<div class="toc-num">CH ' + (i + 1) + '</div><div class="toc-label">' + esc(d.chapter_title) + '</div>';
        c.addEventListener('click', () => openChapter(base + d.file, d.chapter_title));
        grid.appendChild(c);
      });
      $('toc').classList.remove('hidden');
      showBreadcrumb([
        { label: 'SlideStudio', onClick: goLibraryHome },
        { label: data.title, active: true },
      ]);
    }

    function goToToc() {
      hideAll();
      fromToc = false;
      $('toc').classList.remove('hidden');
      showBreadcrumb([
        { label: 'SlideStudio', onClick: goLibraryHome },
        { label: currentPaperTitle, active: true },
      ]);
    }

    async function openChapter(url, chapterTitle) {
      try {
        const data = await load(url);
        currentChapterTitle = chapterTitle;
        fromToc = true;
        hideAll();
        showReel(data.slides, data.images || []);
      } catch (e) { alert('Could not load chapter: ' + e.message); }
    }

    /* ─── Reel ───────────────────────────────── */
    function showReel(data, images) {
      slides = data; deckImages = images; idx = 0;

      if (fromToc) {
        $('btn-back').classList.remove('hidden');
        showBreadcrumb([
          { label: 'SlideStudio', onClick: goLibraryHome },
          { label: currentPaperTitle, onClick: goToToc },
          { label: currentChapterTitle, active: true },
        ]);
      } else {
        showBreadcrumb([
          { label: 'SlideStudio', onClick: goLibraryHome },
          { label: currentPaperTitle, active: true },
        ]);
      }

      const box = $('sbox');
      box.innerHTML = '';
      data.forEach((s, i) => {
        const d = document.createElement('div');
        d.className = 'slide' + (i === 0 ? ' active' : '');

        let inner =
          '<div class="slide-tag">'  + esc(s.tag || '') + '</div>' +
          '<h2 class="slide-title">' + esc(s.heading)   + '</h2>'  +
          '<p class="slide-body">'   + esc(s.body)       + '</p>';

        if (s.latex) {
          inner += '<div class="slide-math">$$' + s.latex + '$$</div>';
        }

        // Multiple figures render as a vertical stack. Accept the legacy
        // singular image_ref too so previously generated decks still display.
        const refs = Array.isArray(s.image_refs) ? s.image_refs
                   : (s.image_ref != null ? [s.image_ref] : []);
        refs.forEach(ref => {
          const img = deckImages.find(im => im.index === ref);
          if (img && img.data_uri) {
            inner +=
              '<figure class="slide-figure">' +
              '<img src="' + img.data_uri + '" alt="' + esc(img.caption || '') + '">' +
              (img.caption ? '<figcaption>' + esc(img.caption) + '</figcaption>' : '') +
              '</figure>';
          }
        });

        d.innerHTML = inner;
        box.appendChild(d);
      });
      $('reel').classList.remove('hidden');
      sync();
      typeset(box);
    }

    function typeset(container) {
      if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetPromise([container]).catch(err => console.warn('MathJax error:', err));
      }
    }

    function goTo(n) {
      const all = $('sbox').querySelectorAll('.slide');
      if (n < 0 || n >= all.length) return;

      const goingForward = n > idx;

      all[idx].classList.remove('active');
      all[idx].classList.toggle('prev', goingForward);

      idx = n;

      all[idx].classList.remove('prev');
      all[idx].classList.add('active');
      sync();
    }

    function sync() {
      const t = slides.length;
      $('counter').textContent = (idx + 1) + ' / ' + t;
      $('btn-prev').disabled   = idx === 0;
      $('btn-next').disabled   = idx === t - 1;
      $('pfill').style.width   = ((idx + 1) / t * 100) + '%';
    }

    /* ─── Events ─────────────────────────────── */
    $('btn-prev').addEventListener('click', () => goTo(idx - 1));
    $('btn-next').addEventListener('click', () => goTo(idx + 1));
    $('btn-back').addEventListener('click', () => goToToc());
    $('btn-archive-nav').addEventListener('click', () => {
      showArchiveView(currentArchivedEntries);
    });

    /* ─── Figure click-to-zoom ──────────────── */
    function openZoom(src, alt) {
      $('zoom-img').src = src;
      $('zoom-img').alt = alt || '';
      $('zoom-overlay').classList.add('open');
    }
    function closeZoom() {
      $('zoom-overlay').classList.remove('open');
      $('zoom-img').src = '';
    }
    // Delegated so it covers figures in slides rendered after load.
    $('sbox').addEventListener('click', e => {
      const img = e.target.closest('.slide-figure img');
      if (img) openZoom(img.src, img.alt);
    });
    $('zoom-overlay').addEventListener('click', closeZoom);

    document.addEventListener('keydown', e => {
      if (document.activeElement === $('library-search')) return;
      if (document.activeElement === $('archive-search')) return;
      if ($('zoom-overlay').classList.contains('open')) {
        if (e.key === 'Escape') closeZoom();
        return;  // don't navigate slides while zoomed
      }
      if (e.key === 'ArrowLeft')  goTo(idx - 1);
      if (e.key === 'ArrowRight') goTo(idx + 1);
      if (e.key === 'Escape') {
        $('collision-modal').classList.add('hidden');
        $('settings-modal').classList.add('hidden');
      }
    });

    /* ─── Upload & Generation ───────────────── */
    function initUpload() {
      const zone   = $('upload-zone');
      const input  = $('file-input');
      const browse = $('upload-browse');
      const navBtn = $('btn-upload-nav');

      navBtn.addEventListener('click', showUploadView);

      browse.addEventListener('click', e => { e.stopPropagation(); input.click(); });
      zone.addEventListener('click', () => input.click());
      input.addEventListener('change', () => {
        if (input.files[0]) uploadFile(input.files[0]);
      });
      zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
      zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.classList.remove('drag-over');
        const f = e.dataTransfer.files[0];
        if (f && f.name.toLowerCase().endsWith('.pdf')) uploadFile(f);
      });

      $('gen-reset').addEventListener('click', resetUploadZone);
      $('gen-resume').addEventListener('click', resumeJob);
    }

    function showUploadView() {
      hideAll();
      $('upload-view').classList.remove('hidden');
      $('btn-upload-nav').classList.add('active');
      showBreadcrumb([
        { label: 'SlideStudio', onClick: goLibraryHome },
        { label: 'New Slides', active: true }
      ]);
      if (_pollTimer) {
        $('upload-zone').classList.add('hidden');
        $('gen-panel').classList.remove('hidden');
      } else {
        $('upload-zone').classList.remove('hidden');
        $('gen-panel').classList.add('hidden');
      }
    }

    async function uploadFile(file) {
      showGenerating(file.name);
      const fd = new FormData();
      fd.append('file', file);
      let jobId;
      try {
        const r = await fetch('/upload', { method: 'POST', body: fd });
        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          throw new Error(err.detail || 'Upload failed');
        }
        ({ job_id: jobId } = await r.json());
      } catch (e) {
        showGenError(e.message);
        return;
      }
      pollJob(jobId);
    }

    function showGenerating(filename) {
      $('upload-zone').classList.add('hidden');
      $('gen-panel').classList.remove('hidden');
      $('gen-filename').textContent = filename;
      $('gen-error').classList.add('hidden');
      $('gen-resume').classList.add('hidden');
      renderStages({});
    }

    function renderStages(progress) {
      const isMultiDeck = 'chapter' in progress;
      const keys = isMultiDeck
        ? ['extract', 'analyst', 'chapter']
        : ['extract', 'analyst', 'planner', 'writer', 'review'];

      const list = $('gen-stages');
      list.innerHTML = '';
      keys.forEach(key => {
        const p    = progress[key];
        const done = p ? p.completed >= p.total && p.total > 0 : false;
        const active = key in progress && !done;

        let label = STAGE_LABELS[key];
        if (key === 'chapter' && p && p.total > 1) {
          label += ' ' + p.completed + ' / ' + p.total;
        }

        const li = document.createElement('li');
        li.className = 'gen-stage' + (done ? ' done' : active ? ' active' : '');
        li.innerHTML =
          '<span class="gen-stage-dot">' + (done ? '✓' : active ? '—' : '') + '</span>' +
          '<span>' + label + '</span>';
        list.appendChild(li);
      });
    }

    function pollJob(jobId) {
      _currentJobId = jobId;
      _pollTimer = setInterval(async () => {
        let data;
        try {
          const r = await fetch('/status/' + jobId);
          if (!r.ok) return;
          data = await r.json();
        } catch (_) { return; }

        renderStages(data.progress || {});

        if (data.status === 'done') {
          clearInterval(_pollTimer);
          _pollTimer = null;
          if (data.output_url) {
            try {
              const slideData = await load(data.output_url);
              currentPaperTitle = slideData.title || '';
              currentTocFile    = data.output_url;
              fromToc = false;
              await refreshLibrary();
              resetUploadZone();
              if (slideData.type === 'multi_deck') {
                hideAll();
                showTOC(slideData);
              } else {
                hideAll();
                showReel(slideData.slides, slideData.images || []);
              }
            } catch (e) {
              showGenError('Could not load slides: ' + e.message);
            }
          } else {
            resetUploadZone();
            goLibraryHome();
          }
        } else if (data.status === 'error') {
          clearInterval(_pollTimer);
          _pollTimer = null;
          showGenError(data.error || 'Generation failed.');
        }
      }, 2000);
    }

    function showGenError(msg) {
      $('gen-error').textContent = msg;
      $('gen-error').classList.remove('hidden');
      // Offer to resume from the last completed stage instead of restarting.
      $('gen-resume').classList.toggle('hidden', !_currentJobId);
    }

    async function resumeJob() {
      if (!_currentJobId) return;
      const jobId = _currentJobId;
      $('gen-resume').classList.add('hidden');
      $('gen-error').classList.add('hidden');
      try {
        const r = await fetch('/resume/' + jobId, { method: 'POST' });
        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          throw new Error(err.detail || 'Resume failed');
        }
      } catch (e) {
        showGenError(e.message);
        return;
      }
      pollJob(jobId);
    }

    function resetUploadZone() {
      if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
      _currentJobId = null;
      $('gen-panel').classList.add('hidden');
      $('gen-resume').classList.add('hidden');
      $('upload-zone').classList.remove('hidden');
      $('file-input').value = '';
    }

    /* ─── Settings Modal ─────────────────────── */
    let _sModels   = [];   // [{key, value}]
    let _sProvider = '';
    let _sPolicy   = 'overwrite';   // "overwrite" | "keep_both"

    async function openSettings() {
      try {
        const data = await load('/settings');
        _sProvider = data.PROVIDER;
        _sModels   = Object.entries(data.MODELS).map(([key, value]) => ({ key, value }));
        _sPolicy   = (data.PIPELINE && data.PIPELINE.duplicate_policy) || 'overwrite';
      } catch (_) {}
      renderSettingsForm();
      $('settings-modal').classList.remove('hidden');
    }

    function renderSettingsForm() {
      const theme = document.documentElement.getAttribute('data-theme');
      $('s-theme-dark').classList.toggle('active', theme === 'dark');
      $('s-theme-light').classList.toggle('active', theme === 'light');
      $('s-policy-overwrite').classList.toggle('active', _sPolicy === 'overwrite');
      $('s-policy-keep').classList.toggle('active', _sPolicy === 'keep_both');
      $('s-error').textContent = '';
      renderProviderSelect();
      renderModelsList();
    }

    function renderProviderSelect() {
      const sel = $('s-provider');
      // preserve whatever the user has already selected in the dropdown
      const cur = sel.value || _sProvider;
      sel.innerHTML = '';
      _sModels.forEach(({ key }) => {
        if (!key) return;
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = key;
        opt.selected = key === cur;
        sel.appendChild(opt);
      });
      // keep _sProvider in sync with the actual select value
      _sProvider = sel.value;
    }

    function renderModelsList() {
      const sel = $('s-provider');
      const activeKey = sel.value || _sProvider;
      const list = $('s-models-list');
      list.innerHTML = '';
      _sModels.forEach((row, i) => {
        const div = document.createElement('div');
        div.className = 'settings-model-row';

        const keyIn = document.createElement('input');
        keyIn.className = 'settings-input';
        keyIn.value = row.key;
        keyIn.placeholder = 'provider-name';
        keyIn.addEventListener('input', e => {
          _sModels[i].key = e.target.value;
          renderProviderSelect();
          // refresh only disabled states — re-rendering the whole list would lose focus
          const activeKey = $('s-provider').value || _sProvider;
          $('s-models-list').querySelectorAll('.settings-del-btn').forEach((btn, j) => {
            btn.disabled = (_sModels[j] && _sModels[j].key === activeKey);
          });
        });

        const valIn = document.createElement('input');
        valIn.className = 'settings-input';
        valIn.value = row.value;
        valIn.placeholder = 'model-string';
        valIn.addEventListener('input', e => { _sModels[i].value = e.target.value; });

        const del = document.createElement('button');
        del.className = 'settings-del-btn';
        del.title = 'Remove';
        del.disabled = (row.key === activeKey);
        del.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:14px;height:14px;stroke-width:1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>';
        del.addEventListener('click', () => {
          _sModels.splice(i, 1);
          renderProviderSelect();
          renderModelsList();
        });

        div.appendChild(keyIn);
        div.appendChild(valIn);
        div.appendChild(del);
        list.appendChild(div);
      });
    }

    async function saveSettings() {
      const provider = $('s-provider').value;
      if (!provider) { $('s-error').textContent = 'Select a provider.'; return; }

      const models = {};
      for (const { key, value } of _sModels) {
        const k = key.trim(), v = value.trim();
        if (!k || !v) { $('s-error').textContent = 'All model rows must have a key and a value.'; return; }
        models[k] = v;
      }
      if (!(provider in models)) { $('s-error').textContent = `Provider "${provider}" is not in the models list.`; return; }

      try {
        const r = await fetch('/settings', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            PROVIDER: provider,
            MODELS: models,
            PIPELINE: { duplicate_policy: _sPolicy },
          }),
        });
        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          $('s-error').textContent = err.detail || 'Save failed.';
          return;
        }
        $('settings-modal').classList.add('hidden');
      } catch (e) {
        $('s-error').textContent = 'Network error: ' + e.message;
      }
    }

    function initSettings() {
      $('settings-btn').addEventListener('click', openSettings);
      $('s-cancel').addEventListener('click', () => $('settings-modal').classList.add('hidden'));
      $('s-save').addEventListener('click', saveSettings);
      $('s-theme-dark').addEventListener('click', () => { setTheme('dark');  renderSettingsForm(); });
      $('s-theme-light').addEventListener('click', () => { setTheme('light'); renderSettingsForm(); });
      $('s-policy-overwrite').addEventListener('click', () => { _sPolicy = 'overwrite'; renderSettingsForm(); });
      $('s-policy-keep').addEventListener('click', () => { _sPolicy = 'keep_both'; renderSettingsForm(); });
      $('s-provider').addEventListener('change', e => { _sProvider = e.target.value; renderModelsList(); });
      $('s-add-model').addEventListener('click', () => {
        _sModels.push({ key: '', value: '' });
        renderModelsList();
        renderProviderSelect();
      });
      $('settings-modal').addEventListener('click', e => {
        if (e.target === $('settings-modal')) $('settings-modal').classList.add('hidden');
      });
    }

    /* ─── Bootstrap ──────────────────────────── */
    async function init() {
      initTheme();
      initSettings();
      initUpload();
      showBreadcrumb([{ label: 'SlideStudio', active: true }]);
      if (FILE) {
        try {
          const data = await load(FILE);
          currentPaperTitle = data.title || '';
          if (data.type === 'multi_deck') {
            hideAll();
            showTOC(data);
          } else {
            hideAll();
            showReel(data.slides, data.images || []);
          }
        } catch (e) {
          $('msg').textContent = 'The archives are unreachable: ' + e.message;
        }
      } else {
        await refreshLibrary();
        showLibrary(currentLibraryEntries);
      }
    }

    init();
  </script>
</body>
</html>
